name: Publish Angora SDKs

on:
  workflow_dispatch:
    inputs:
      package:
        description: SDK package to publish
        required: true
        default: both
        type: choice
        options:
          - both
          - typescript
          - python

jobs:
  publish-typescript:
    if: ${{ github.event.inputs.package == 'both' || github.event.inputs.package == 'typescript' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install and build TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build
          npm pack --dry-run
      - name: Publish TypeScript SDK to npm
        working-directory: sdk/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    if: ${{ github.event.inputs.package == 'both' || github.event.inputs.package == 'python' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Python SDK
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - name: Publish Python SDK to PyPI
        working-directory: sdk/python
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
